name: Publish CLI

on: [push, pull_request]

jobs:
  publish:
    name: Publish ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: poodle-linux-x64
          - os: windows-latest
            rid: win-x64
            artifact_name: poodle-win-x64
          - os: macos-latest
            rid: osx-x64
            artifact_name: poodle-osx-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish
        run: >
          dotnet publish src/Poodle.Cli/Poodle.Cli.csproj --configuration Release --runtime ${{
          matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false
          --output artifacts/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.rid }}/
